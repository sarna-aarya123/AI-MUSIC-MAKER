<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beat Identity Engine</title>
  <link rel="stylesheet" href="styles/loop_studio.css" />
</head>
<body>

<div class="studio">

  <!-- ── Topbar ─────────────────────────────────────────────────────────────── -->
  <header class="topbar">
    <span class="brand">BEAT IDENTITY ENGINE</span>
    <span class="brand-sub">loop generator</span>

    <div class="transport-group">
      <button id="btn-evolve"   class="btn btn-evolve">EVOLVE</button>
      <button id="btn-activate" class="btn btn-activate" disabled>▶ ACTIVATE</button>
      <button id="btn-stop"     class="btn" disabled>■</button>
      <button id="btn-mutate"   class="btn btn-mutate" disabled title="Drift motif now">⟳ DRIFT</button>
    </div>
  </header>

  <!-- ── Phase pulse ──────────────────────────────────────────────────────────── -->
  <div class="phase-pulse-wrap">
    <div id="phase-bar"></div>
  </div>

  <!-- ── Controls strip ───────────────────────────────────────────────────────── -->
  <div class="controls-strip">
    <label class="ctrl-group">
      <span>GENRE</span>
      <select id="ctrl-genre">
        <option value="rage">RAGE</option>
        <option value="pluggnb">PLUGGNB</option>
        <option value="dark_trap">DARK TRAP</option>
        <option value="cloud">CLOUD</option>
      </select>
    </label>

    <label class="ctrl-group">
      <span>ROOT</span>
      <select id="ctrl-root">
        <option value="A" selected>A</option>
        <option value="A#">A#</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="C#">C#</option>
        <option value="D">D</option>
        <option value="D#">D#</option>
        <option value="E">E</option>
        <option value="F">F</option>
        <option value="F#">F#</option>
        <option value="G">G</option>
        <option value="G#">G#</option>
      </select>
    </label>

    <label class="ctrl-group">
      <span>BPM</span>
      <input id="ctrl-bpm" type="number" value="140" min="60" max="220" />
    </label>

    <label class="ctrl-group">
      <span>LOOP LENGTH</span>
      <select id="ctrl-bars">
        <option value="1">1 bar</option>
        <option value="2" selected>2 bars</option>
        <option value="4">4 bars</option>
        <option value="8">8 bars</option>
      </select>
    </label>

    <span id="status-text" style="margin-left:auto; font-size:10px; color:#444; font-family:monospace;"></span>
  </div>

  <!-- ── Main area ─────────────────────────────────────────────────────────────── -->
  <div class="loop-area">

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">◈</div>
      <span>Press EVOLVE to generate a loop identity</span>
    </div>

    <!-- Loop view (hidden until first evolve) -->
    <div id="loop-view" hidden>

      <!-- MOTIF layer -->
      <div class="layer layer-motif">
        <div class="layer-header">
          <div class="layer-name">MOTIF</div>
          <div class="layer-sub">looping pattern</div>
          <div class="layer-controls">
            <button class="btn btn-mute" data-layer="motif" title="Mute motif">M</button>
          </div>
        </div>
        <div id="clip-motif" class="layer-clip">
          <div class="layer-playhead" id="ph-motif"></div>
        </div>
      </div>

      <!-- BASS layer -->
      <div class="layer layer-bass">
        <div class="layer-header">
          <div class="layer-name">BASS</div>
          <div class="layer-sub">root anchor</div>
          <div class="layer-controls">
            <button class="btn btn-mute" data-layer="bass" title="Mute bass">M</button>
          </div>
        </div>
        <div id="clip-bass" class="layer-clip">
          <div class="layer-playhead" id="ph-bass"></div>
        </div>
      </div>

      <!-- TEXTURE layer -->
      <div class="layer layer-texture" style="flex:1">
        <div class="layer-header">
          <div class="layer-name">TEXTURE</div>
          <div class="layer-sub">stacked voices</div>
          <div class="layer-controls">
            <button class="btn btn-mute" data-layer="texture" title="Mute texture">M</button>
          </div>
        </div>
        <div class="layer-clip" style="flex:1">
          <div id="texture-stack"></div>
        </div>
      </div>

    </div><!-- /#loop-view -->
  </div><!-- /.loop-area -->

  <!-- ── Status bar ──────────────────────────────────────────────────────────── -->
  <footer class="statusbar">
    <span id="status-main">No loop loaded — press EVOLVE</span>
  </footer>

</div><!-- /.studio -->

<!-- ── Import panel (feel-based, not note-based) ──────────────────────────── -->
<div id="import-panel" class="import-panel">
  <div class="import-header">
    <span class="import-title">IMPORT FEEL</span>
    <span class="import-hint">audio → loop identity</span>
    <button id="btn-import-toggle" class="import-toggle" title="Collapse">–</button>
  </div>
  <div id="import-body" class="import-body">
    <div id="import-dropzone" class="import-dropzone" role="button" tabindex="0"
         title="Click to browse or drag an audio file">
      <span class="import-drop-label">Drop MP3 / WAV here, or click to browse</span>
      <input id="import-file-input" type="file" accept="audio/*" hidden />
    </div>
    <div id="import-progress" class="import-progress" style="display:none">
      <div id="import-progress-bar" class="import-progress-bar"></div>
    </div>
    <div class="import-actions">
      <button id="btn-import-generate" class="btn btn-import-generate" disabled>
        Generate Similar Loop Identity
      </button>
    </div>
    <div id="import-status" class="import-status"></div>
  </div>
</div>

<!-- ── Scripts (order matters) ───────────────────────────────────────────────── -->
<script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
<script src="audio/loopEngine.js"></script>
<script src="audio/loopScheduler.js"></script>
<script src="scripts/loop_studio.js"></script>
<script src="audio/melodyExtractor.js"></script>
<script src="scripts/importUI.js"></script>

</body>
</html>
